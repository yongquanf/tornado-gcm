name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy pytest

      - name: Define targets
        run: |
          echo "TARGETS=__init__.py cli.py scales.py typing.py units.py core neural model inference training precision distributed" >> $GITHUB_ENV

      - name: Ruff lint
        run: ruff check $TARGETS --exit-zero

      - name: Black format (non-blocking for bootstrap)
        run: black $TARGETS

      - name: isort format (non-blocking for bootstrap)
        run: isort $TARGETS

      - name: Mypy type check
        run: mypy --ignore-missing-imports --follow-imports=skip cli.py || true

      - name: Compile smoke check
        run: python -m compileall -q .

      - name: Pytest
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests/ directory yet; skipping pytest in bootstrap phase."
          fi
